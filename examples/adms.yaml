driver: postgres
dsn: "postgres://postgres:postgres@localhost:5433/adms_test?sslmode=disable"
listen: ":7777"
timeout: 30s
read_only: false

allowed_schemas:
  - public
allowed_tables: []

cors_origins: []

# Name of an env var holding the bearer token; an empty string disables
# bearer auth. When ui.enabled is true, the UI auto-forwards the resolved
# token to its browser fetches via a meta tag.
auth_token_env: ""

log_level: info

ui:
  enabled: true
  listen: ":7778"
