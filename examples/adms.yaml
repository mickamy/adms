driver: postgres
dsn: "postgres://postgres:postgres@localhost:5433/adms_test?sslmode=disable"
listen: ":7777"
timeout: 30s
read_only: false

allowed_schemas:
  - public
allowed_tables: []

cors_origins: []

# Authentication. mode defaults to "none" (fully open). Set mode to "static"
# and point static.token_env at an env var holding the bearer token to require
# it. When ui.enabled is true, the UI auto-forwards the resolved token to its
# browser fetches via a meta tag.
auth:
  mode: none
  # static:
  #   token_env: ADMS_TOKEN

log_level: info

ui:
  enabled: true
  listen: ":7778"
