name: CI

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test -race ./...

  integration-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Start service containers
        run: make compose-up

      - name: Run integration tests
        run: make test-integration GOTESTFLAGS="-covermode=atomic -coverprofile=cover.out"

      - name: Stop service containers
        if: always()
        run: make compose-down

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: ./cover.out
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        run: make build

  ui-css-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Regenerate the committed tailwind.css and fail the job if the
      # working tree changes — i.e., a template touched a class that the
      # committed bundle does not contain. The standalone CLI download is
      # ~5 MB and rebuild is ~200 ms, so the cost per run is negligible.
      - name: Regenerate tailwind.css
        run: make ui-css

      - name: Fail if tailwind.css is out of date
        run: |
          if ! git diff --exit-code internal/ui/static/css/tailwind.css; then
            echo "::error::internal/ui/static/css/tailwind.css is out of date — run 'make ui-css' and commit the result"
            exit 1
          fi
