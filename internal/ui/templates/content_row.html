{{define "content_row.html"}}
{{with .ContentTable}}
<div class="mb-4 flex items-end justify-between gap-4">
  <div>
    <h1 class="text-2xl font-semibold">{{.Name}}</h1>
    <p class="text-zinc-500 text-sm">{{.Schema}} · {{$.RowPKColumn}} = {{$.RowPK}}</p>
  </div>
  <a href="/t/{{.Name}}" class="text-sm text-zinc-400 hover:text-zinc-200">← Back</a>
</div>

<form id="row-form" class="space-y-3 max-w-2xl">
  {{range .Columns}}
  <div>
    <label class="block text-zinc-400 text-sm mb-1">
      {{.Name}}
      <span class="text-zinc-600 text-xs ml-1">{{.Type}}{{if .Nullable}} · nullable{{end}}</span>
    </label>
    <div class="flex items-center gap-2">
      <input data-col="{{.Name}}" name="{{.Name}}"
        class="flex-1 px-2 py-1 rounded bg-zinc-900 border border-zinc-800 focus:outline-none focus:ring-1 focus:ring-zinc-600">
      <a data-fk-link="{{.Name}}" href="#" class="hidden text-zinc-400 hover:text-zinc-100 text-sm whitespace-nowrap"></a>
    </div>
  </div>
  {{end}}
  <div class="flex gap-2 items-center pt-2">
    <button type="submit" class="px-3 py-1.5 rounded bg-zinc-100 text-zinc-900 text-sm font-medium hover:bg-white">Save</button>
    <button type="button" id="delete" class="px-3 py-1.5 rounded bg-red-900/60 text-red-100 text-sm hover:bg-red-900">Delete</button>
    <span id="status" class="text-sm text-zinc-400"></span>
  </div>
</form>

{{if $.ReferencedBy}}
<section class="mt-8 max-w-2xl">
  <h2 class="text-sm uppercase tracking-wide text-zinc-500 mb-2">Referenced by</h2>
  <ul class="space-y-1 text-sm">
    {{range $.ReferencedBy}}
    <li>
      <a href="/t/{{.Table}}?{{.Column}}=eq.{{$.RowPK}}&order={{.Column}}.asc"
        class="text-zinc-300 hover:text-zinc-100">
        {{.Table}}.{{.Column}} = {{$.RowPK}}
      </a>
    </li>
    {{end}}
  </ul>
</section>
{{end}}

<script>
  (function () {
    const tableName = {{.Name}};
    const columns = [{{range $i, $col := .Columns}}{{if $i}},{{end}}{{$col.Name}}{{end}}];
    const apiOrigin = document.querySelector('meta[name="adms-api-origin"]').content;
    const pkColumn = {{$.RowPKColumn}};
    const pkValue = {{$.RowPK}};
    const outgoingFKs = {
      {{range $col, $ref := $.OutgoingFKs}}{{$col}}: { table: {{$ref.Table}}, column: {{$ref.Column}} },{{end}}
    };
    const fkLinks = new Map();
    document.querySelectorAll('[data-fk-link]').forEach((el) => {
      fkLinks.set(el.dataset.fkLink, el);
    });
    const form = document.getElementById('row-form');
    const status = document.getElementById('status');

    function setStatus(msg, isError) {
      status.textContent = msg;
      status.className = 'text-sm ' + (isError ? 'text-red-400' : 'text-zinc-400');
    }

    async function readError(resp) {
      const text = await resp.text();
      try {
        const p = JSON.parse(text);
        return p.detail || p.title || text;
      } catch (_) { return text || String(resp.status); }
    }

    function parseValue(v) {
      if (v === '') return undefined;
      if (v === 'null') return null;
      if (v === 'true') return true;
      if (v === 'false') return false;
      if (/^-?\d+(\.\d+)?$/.test(v)) return Number(v);
      try { return JSON.parse(v); } catch (_) { return v; }
    }

    function updateFKLink(col) {
      const ref = outgoingFKs[col];
      if (!ref) return;
      const link = fkLinks.get(col);
      if (!link) return;
      const v = form.elements[col].value;
      if (v === '' || v === 'null') {
        link.classList.add('hidden');
        return;
      }
      link.classList.remove('hidden');
      link.textContent = '→ ' + ref.table;
      link.href = '/t/' + encodeURIComponent(ref.table) + '/r/' + encodeURIComponent(v);
    }

    async function loadRow() {
      const url = new URL(apiOrigin + '/' + tableName);
      url.searchParams.set(pkColumn, 'eq.' + pkValue);
      url.searchParams.set('limit', '1');
      const resp = await fetch(url);
      if (!resp.ok) { setStatus(await readError(resp), true); return; }
      const rows = await resp.json();
      if (!rows.length) { setStatus('Row not found.', true); return; }
      const row = rows[0];
      columns.forEach((c) => {
        const input = form.elements[c];
        if (!input) return;
        const v = row[c];
        input.value = (v === null || v === undefined) ? '' : (typeof v === 'object' ? JSON.stringify(v) : String(v));
        updateFKLink(c);
      });
    }

    Object.keys(outgoingFKs).forEach((c) => {
      const input = form.elements[c];
      if (input) input.addEventListener('input', () => updateFKLink(c));
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      setStatus('Saving…', false);
      const body = {};
      columns.forEach((c) => {
        const v = parseValue(form.elements[c].value);
        if (v !== undefined) body[c] = v;
      });
      const url = new URL(apiOrigin + '/' + tableName);
      url.searchParams.set(pkColumn, 'eq.' + pkValue);
      const resp = await fetch(url, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (resp.ok) { window.location.href = '/t/' + tableName; return; }
      setStatus('PATCH ' + resp.status + ': ' + await readError(resp), true);
    });

    document.getElementById('delete').addEventListener('click', async () => {
      if (!confirm('Delete this row?')) return;
      setStatus('Deleting…', false);
      const url = new URL(apiOrigin + '/' + tableName);
      url.searchParams.set(pkColumn, 'eq.' + pkValue);
      const resp = await fetch(url, { method: 'DELETE' });
      if (resp.ok) { window.location.href = '/t/' + tableName; return; }
      setStatus('DELETE ' + resp.status + ': ' + await readError(resp), true);
    });

    loadRow();
  })();
</script>
{{end}}
{{end}}
