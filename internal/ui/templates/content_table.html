{{define "content_table.html"}}
{{with .ContentTable}}
<div class="mb-4 flex items-end justify-between gap-4">
  <div>
    <h1 class="text-2xl font-semibold">{{.Name}}</h1>
    <p class="text-zinc-500 text-sm">{{.Schema}}{{if .PrimaryKey}} · PK: {{range $i, $col := .PrimaryKey}}{{if $i}}, {{end}}{{$col}}{{end}}{{end}}</p>
  </div>
  <div class="text-sm text-zinc-400" id="content-range">—</div>
</div>

<form id="filters" class="grid grid-cols-1 md:grid-cols-3 gap-2 mb-4 text-sm">
  <div>
    <label class="block text-zinc-500 text-xs mb-1">order=</label>
    <input name="order" placeholder="col.desc,col2.asc"
      class="w-full px-2 py-1 rounded bg-zinc-900 border border-zinc-800 focus:outline-none focus:ring-1 focus:ring-zinc-600">
  </div>
  <div>
    <label class="block text-zinc-500 text-xs mb-1">limit=</label>
    <input name="limit" type="number" min="1" value="20"
      class="w-full px-2 py-1 rounded bg-zinc-900 border border-zinc-800 focus:outline-none focus:ring-1 focus:ring-zinc-600">
  </div>
  <div>
    <label class="block text-zinc-500 text-xs mb-1">offset=</label>
    <input name="offset" type="number" min="0" value="0"
      class="w-full px-2 py-1 rounded bg-zinc-900 border border-zinc-800 focus:outline-none focus:ring-1 focus:ring-zinc-600">
  </div>
  {{range .Columns}}
  <div>
    <label class="block text-zinc-500 text-xs mb-1">{{.Name}}=</label>
    <input name="{{.Name}}" placeholder="eq.value, gt.0, like.*foo*"
      class="w-full px-2 py-1 rounded bg-zinc-900 border border-zinc-800 focus:outline-none focus:ring-1 focus:ring-zinc-600">
  </div>
  {{end}}
</form>

<div class="overflow-x-auto border border-zinc-800 rounded">
  <table class="min-w-full text-sm">
    <thead class="bg-zinc-900 text-zinc-400">
      <tr>
        {{range .Columns}}<th data-col="{{.Name}}" class="px-3 py-2 text-left font-medium whitespace-nowrap cursor-pointer select-none">{{.Name}}<span class="text-zinc-600 text-xs ml-1">{{.Type}}</span></th>{{end}}
      </tr>
    </thead>
    <tbody id="rows" class="divide-y divide-zinc-800">
      <tr><td colspan="{{len .Columns}}" class="px-3 py-6 text-zinc-500 text-center">Loading…</td></tr>
    </tbody>
  </table>
</div>

<div class="mt-4 flex gap-2">
  <button type="button" id="prev"
    class="px-3 py-1 rounded bg-zinc-900 border border-zinc-800 text-sm hover:bg-zinc-800">Prev</button>
  <button type="button" id="next"
    class="px-3 py-1 rounded bg-zinc-900 border border-zinc-800 text-sm hover:bg-zinc-800">Next</button>
</div>

<script>
  (function () {
    const tableName = {{.Name}};
    const columns = [{{range $i, $col := .Columns}}{{if $i}},{{end}}{{$col.Name}}{{end}}];
    const apiOrigin = document.querySelector('meta[name="adms-api-origin"]').content;
    const form = document.getElementById('filters');
    const tbody = document.getElementById('rows');
    const rangeEl = document.getElementById('content-range');

    function escapeHTML(s) {
      return String(s).replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function buildURL() {
      const url = new URL(apiOrigin + '/' + tableName);
      new FormData(form).forEach((v, k) => {
        if (v !== '' && v != null) url.searchParams.set(k, String(v));
      });
      return url;
    }

    async function load() {
      tbody.innerHTML = `<tr><td colspan="${columns.length}" class="px-3 py-6 text-zinc-500 text-center">Loading…</td></tr>`;
      try {
        const resp = await fetch(buildURL(), { headers: { Prefer: 'count=exact' } });
        rangeEl.textContent = resp.headers.get('Content-Range') || '—';
        if (!resp.ok) {
          const body = await resp.text();
          tbody.innerHTML = `<tr><td colspan="${columns.length}" class="px-3 py-6 text-red-400 text-center">${escapeHTML(body) || resp.status}</td></tr>`;
          return;
        }
        renderRows(await resp.json());
      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="${columns.length}" class="px-3 py-6 text-red-400 text-center">${escapeHTML(err.message)}</td></tr>`;
      }
    }

    function renderRows(rows) {
      if (!rows.length) {
        tbody.innerHTML = `<tr><td colspan="${columns.length}" class="px-3 py-6 text-zinc-500 text-center">No rows.</td></tr>`;
        return;
      }
      tbody.innerHTML = rows.map((row) =>
        '<tr class="hover:bg-zinc-900">' + columns.map((c) => {
          const v = row[c];
          const cell = (v === null || v === undefined)
            ? '<span class="text-zinc-600">null</span>'
            : escapeHTML(typeof v === 'object' ? JSON.stringify(v) : v);
          return `<td class="px-3 py-2 align-top whitespace-pre-wrap">${cell}</td>`;
        }).join('') + '</tr>'
      ).join('');
    }

    let debounce;
    form.addEventListener('input', () => {
      clearTimeout(debounce);
      debounce = setTimeout(load, 300);
    });
    form.addEventListener('submit', (e) => { e.preventDefault(); load(); });

    document.getElementById('next').addEventListener('click', () => {
      const offset = form.elements.offset;
      const limit = form.elements.limit;
      offset.value = Number(offset.value || 0) + Number(limit.value || 20);
      load();
    });

    document.getElementById('prev').addEventListener('click', () => {
      const offset = form.elements.offset;
      const limit = form.elements.limit;
      offset.value = Math.max(0, Number(offset.value || 0) - Number(limit.value || 20));
      load();
    });

    document.querySelectorAll('thead [data-col]').forEach((th) => {
      th.addEventListener('click', () => {
        const orderInput = form.elements.order;
        const col = th.dataset.col;
        orderInput.value = orderInput.value === col + '.asc' ? col + '.desc' : col + '.asc';
        load();
      });
    });

    load();
  })();
</script>
{{end}}
{{end}}
